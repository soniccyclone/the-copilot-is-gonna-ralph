name: 02 — PRD merged → design doc

on:
  pull_request:
    types: [closed]
    branches:
      - 'feature/issue-*'
    paths:
      - 'docs/planning/*/prd.md'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  start-design:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      DESIGN_MODEL: ${{ vars.DESIGN_MODEL || 'claude-opus-4-7' }}
    steps:
      - name: Check out feature trunk
        uses: actions/checkout@v4
        with:
          ref:   ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Parse parent issue number
        id: parse
        run: |
          n=$(./scripts/parse-issue-number.sh "${BASE_REF}")
          echo "n=${n}" >> "${GITHUB_OUTPUT}"

      - name: Render design prompt
        env:
          PARENT_ISSUE: ${{ steps.parse.outputs.n }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/ralph
          ./scripts/render-template.sh scripts/prompts/design.md.tmpl > /tmp/ralph/design-prompt.md

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI to write design doc
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          copilot --allow-all-tools --allow-all-urls --model "${DESIGN_MODEL}" \
            -p "$(cat /tmp/ralph/design-prompt.md)"

      - name: Open design PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          base:   ${{ env.BASE_REF }}
          branch: ${{ env.BASE_REF }}/design
          title:  "Design doc for #${{ steps.parse.outputs.n }}"
          body:   "Generated by Copilot CLI (${{ env.DESIGN_MODEL }}). Builds on the merged PRD."
          commit-message: "design: #${{ steps.parse.outputs.n }}"
          author: "ralph-bot <ralph-bot@users.noreply.github.com>"
          committer: "ralph-bot <ralph-bot@users.noreply.github.com>"
          delete-branch: true
          labels: ralph:pipeline,ralph:stage-design

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
