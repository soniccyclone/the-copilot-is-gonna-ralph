name: 04 — impl merged → trunk → main

on:
  pull_request:
    types: [closed]
    branches:
      - 'feature/issue-*'

permissions:
  contents: write
  pull-requests: write

jobs:
  open-final:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'feature/issue-') &&
      endsWith(github.event.pull_request.head.ref, '/impl')
    runs-on: ubuntu-latest
    env:
      GH_REPO:  ${{ github.repository }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - name: Open feature trunk → main PR with auto-merge
        env:
          GH_TOKEN: ${{ secrets.COPILOT_USER_PAT }}
        run: |
          set -euo pipefail
          pr_url=$(gh pr create \
            --base main \
            --head "${BASE_REF}" \
            --title "${BASE_REF}: complete" \
            --body  "Final merge of feature trunk \`${BASE_REF}\` into main.")
          gh pr merge "${pr_url}" --auto --squash --delete-branch
