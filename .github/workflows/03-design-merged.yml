name: 03 — design merged → ralph implementation loop

on:
  pull_request:
    types: [closed]
    branches:
      - 'feature/issue-*'
    paths:
      - 'docs/planning/*/design.md'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ralph:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      GH_REPO: ${{ github.repository }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      IMPL_MODEL: ${{ vars.IMPL_MODEL || 'claude-sonnet-4-6' }}
      ITERATIONS: ${{ vars.IMPL_ITERATIONS || '15' }}
    steps:
      - name: Check out feature trunk
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.COPILOT_USER_PAT }}
          fetch-depth: 0

      - name: Parse parent issue number
        id: parse
        run: |
          n=$(./scripts/parse-issue-number.sh "${BASE_REF}")
          echo "n=${n}" >> "${GITHUB_OUTPUT}"

      - name: Create implementation branch
        env:
          PARENT_ISSUE: ${{ steps.parse.outputs.n }}
        run: |
          set -euo pipefail
          git config user.name  "ralph-bot"
          git config user.email "ralph-bot@users.noreply.github.com"
          git switch -c "feature/issue-${PARENT_ISSUE}/impl"

      - name: Set up Node + Copilot CLI
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Render implementation task
        env:
          PARENT_ISSUE: ${{ steps.parse.outputs.n }}
          DESIGN_PATH:  docs/planning/${{ steps.parse.outputs.n }}/design.md
        run: |
          set -euo pipefail
          mkdir -p .ralph
          ./scripts/render-template.sh scripts/prompts/impl-task.md.tmpl > .ralph/tasks
          echo "::group::Task file"
          cat .ralph/tasks
          echo "::endgroup::"

      - name: Run ralph loop
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_USER_PAT }}
        run: |
          ./src/ralph.bash \
            --file .ralph/tasks \
            --model "${IMPL_MODEL}" \
            --iterations "${ITERATIONS}" \
            --no-sdd \
            --verbose

      - name: Commit and push implementation
        env:
          PARENT_ISSUE: ${{ steps.parse.outputs.n }}
        run: |
          set -euo pipefail
          # Defensive: don't commit ralph's own scratch dir
          echo ".ralph/" >> .gitignore
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "error: ralph reported done but produced no changes" >&2
            exit 1
          fi
          git add -A ':!.ralph'
          git commit -m "impl: #${PARENT_ISSUE} (ralph)"
          git push -u origin "feature/issue-${PARENT_ISSUE}/impl"

      - name: Open implementation PR with auto-merge
        env:
          GH_TOKEN:     ${{ secrets.COPILOT_USER_PAT }}
          PARENT_ISSUE: ${{ steps.parse.outputs.n }}
        run: |
          set -euo pipefail
          pr_url=$(gh pr create \
            --base "feature/issue-${PARENT_ISSUE}" \
            --head "feature/issue-${PARENT_ISSUE}/impl" \
            --title "impl: #${PARENT_ISSUE}" \
            --body  "Implements \`docs/planning/${PARENT_ISSUE}/design.md\` via the ralph loop. Closes #${PARENT_ISSUE}.")
          gh pr merge "${pr_url}" --auto --squash --delete-branch
