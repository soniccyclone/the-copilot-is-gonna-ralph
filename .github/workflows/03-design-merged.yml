name: 03 — design merged → ralph impl → trunk → main

on:
  pull_request:
    types: [closed]
    branches:
      - 'feature/issue-*'
    paths:
      - 'docs/planning/*/design.md'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ralph:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      BASE_REF:        ${{ github.event.pull_request.base.ref }}
      IMPL_MODEL:      ${{ vars.IMPL_MODEL || 'claude-sonnet-4-6' }}
      IMPL_ITERATIONS: ${{ vars.IMPL_ITERATIONS || '15' }}
    steps:
      - name: Check out feature trunk
        uses: actions/checkout@v4
        with:
          ref:   ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Parse parent issue number
        id: parse
        run: |
          n=$(./scripts/parse-issue-number.sh "${BASE_REF}")
          echo "n=${n}" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Render implementation task
        env:
          PARENT_ISSUE: ${{ steps.parse.outputs.n }}
          DESIGN_PATH:  docs/planning/${{ steps.parse.outputs.n }}/design.md
        run: |
          set -euo pipefail
          mkdir -p .ralph
          ./scripts/render-template.sh scripts/prompts/impl-task.md.tmpl > .ralph/tasks

      - name: Run ralph loop
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          ./src/ralph.bash \
            --file .ralph/tasks \
            --model "${IMPL_MODEL}" \
            --iterations "${IMPL_ITERATIONS}" \
            --no-sdd \
            --verbose

      - name: Commit impl onto trunk
        env:
          PARENT_ISSUE: ${{ steps.parse.outputs.n }}
        run: |
          set -euo pipefail
          rm -rf .ralph
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "ralph reported done but produced no changes" >&2
            exit 1
          fi
          git config user.name  "ralph-bot"
          git config user.email "ralph-bot@users.noreply.github.com"
          git add -A
          git commit -m "impl: #${PARENT_ISSUE}"
          git push origin "HEAD:${BASE_REF}"

      - name: Open trunk → main PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          PARENT_ISSUE: ${{ steps.parse.outputs.n }}
        run: |
          set -euo pipefail
          pr_url=$(gh pr create \
            --base main \
            --head "${BASE_REF}" \
            --title "Feature #${PARENT_ISSUE}: complete" \
            --body "Closes #${PARENT_ISSUE}. Full feature: PRD, design, and implementation (model \`${IMPL_MODEL}\`)." \
            --label "ralph:pipeline,ralph:stage-impl")
          pr_num="${pr_url##*/}"
          echo "number=${pr_num}" >> "${GITHUB_OUTPUT}"

      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          pull-request-number: ${{ steps.pr.outputs.number }}
          merge-method: squash
