name: 02 — PRD merged → design doc

on:
  pull_request:
    types: [closed]
    branches:
      - 'feature/issue-*'
    paths:
      - 'docs/planning/*/prd.md'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  start-design:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - name: Check out feature trunk
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.COPILOT_USER_PAT }}

      - name: Parse parent issue number
        id: parse
        run: |
          n=$(./scripts/parse-issue-number.sh "${BASE_REF}")
          echo "n=${n}" >> "${GITHUB_OUTPUT}"

      - name: File child issue "Design doc for #N"
        id: child
        env:
          GH_TOKEN:     ${{ secrets.COPILOT_USER_PAT }}
          PARENT_ISSUE: ${{ steps.parse.outputs.n }}
        run: |
          set -euo pipefail
          ./scripts/render-template.sh scripts/prompts/design.md.tmpl > /tmp/design-prompt.md
          child=$(gh issue create \
            --title "Design doc for #${PARENT_ISSUE}" \
            --body  "$(cat /tmp/design-prompt.md)" \
            --json number --jq '.number')
          echo "n=${child}" >> "${GITHUB_OUTPUT}"

      - name: Assign Copilot for design doc
        env:
          GH_TOKEN:     ${{ secrets.COPILOT_USER_PAT }}
          DESIGN_AGENT: ${{ vars.DESIGN_AGENT }}
        run: |
          ./scripts/assign-copilot.sh \
            "${{ steps.child.outputs.n }}" \
            "${BASE_REF}" \
            /tmp/design-prompt.md \
            "${DESIGN_AGENT:-}"

      - name: Enable auto-merge on Copilot's design PR
        env:
          GH_TOKEN: ${{ secrets.COPILOT_USER_PAT }}
        run: ./scripts/enable-automerge.sh "${BASE_REF}" 900
