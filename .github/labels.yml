# Declarative label config. The sync-labels workflow reads this and creates or
# updates labels in the repo. Edit and push to apply.
#
# Schema per label:
#   - name:        required, the label string (used in workflow triggers)
#     color:       required, 6-char hex without leading "#"
#     description: optional, shown on hover

labels:
  - name: ralph:start
    color: B60205
    description: Apply this to an issue to kick off the Copilot ralphing pipeline.

  - name: ralph:pipeline
    color: 6F42C1
    description: Auto-applied to PRs the pipeline opens. Required for the @ralph comment loop to act.

  - name: ralph:stage-prd
    color: FBCA04
    description: PRD stage PR (haiku-tier work).

  - name: ralph:stage-design
    color: 0E8A16
    description: Design doc stage PR (opus-tier work).

  - name: ralph:stage-impl
    color: 1D76DB
    description: Implementation stage PR (sonnet-tier ralph loop output).
