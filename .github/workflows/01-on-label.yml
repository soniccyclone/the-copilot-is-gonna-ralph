name: 01 — start (label → trunk + PRD)

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  start:
    if: github.event.label.name == 'ralph:start'
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      BASE_REF: feature/issue-${{ github.event.issue.number }}
      PRD_MODEL: ${{ vars.PRD_MODEL || 'claude-haiku-4-5' }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create feature trunk off main
        run: |
          set -euo pipefail
          git config user.name  "ralph-bot"
          git config user.email "ralph-bot@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "${BASE_REF}" >/dev/null 2>&1; then
            echo "Trunk ${BASE_REF} already exists; reusing."
          else
            git push origin "main:refs/heads/${BASE_REF}"
          fi
          git fetch origin "${BASE_REF}"
          git switch "${BASE_REF}"

      - name: Render PRD prompt
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY:  ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/ralph
          ./scripts/render-template.sh scripts/prompts/prd.md.tmpl > /tmp/ralph/prd-prompt.md

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI to write PRD
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          copilot --allow-all-tools --allow-all-urls --model "${PRD_MODEL}" \
            -p "$(cat /tmp/ralph/prd-prompt.md)"

      - name: Open PRD PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          base:   ${{ env.BASE_REF }}
          branch: ${{ env.BASE_REF }}/prd
          title:  "PRD for #${{ env.ISSUE_NUMBER }}"
          body:   "Generated by Copilot CLI (${{ env.PRD_MODEL }}). Refs #${{ env.ISSUE_NUMBER }}."
          commit-message: "prd: #${{ env.ISSUE_NUMBER }}"
          author: "ralph-bot <ralph-bot@users.noreply.github.com>"
          committer: "ralph-bot <ralph-bot@users.noreply.github.com>"
          delete-branch: true
          labels: ralph:pipeline,ralph:stage-prd

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
